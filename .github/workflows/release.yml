name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # gamedata/ sits at the archive root so MO2 installs the zip as-is.
      # meta.ini is MO2's local install metadata and is deliberately left out.
      - name: Build mod archive
        run: |
          mkdir -p dist
          zip -r "dist/immersive-quest-markers-${GITHUB_REF_NAME}.zip" gamedata

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "dist/immersive-quest-markers-${GITHUB_REF_NAME}.zip" \
            --title "Immersive Quest Markers $GITHUB_REF_NAME" \
            --generate-notes
